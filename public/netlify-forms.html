<!-- Netlify Forms registration for the waitlist form. 
     This hidden file lets Netlify discover the form at build time. -->
<!DOCTYPE html>
<html lang="en">
<head><title>Netlify Forms Registration</title></head>
<body>
  <form name="waitlist" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="waitlist" />
    <input type="email" name="email" />
    <input name="bot-field" />
  </form>
</body>
</html>
